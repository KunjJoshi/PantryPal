<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PantryPal Login</title>
  <link rel="icon" type="image/png" href="images/fridge.png" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg pp-navbar">
    <div class="container">
      <a class="pp-brand" href="index.html">
        <img src="images/fridge.png" alt="PantryPal logo" />
        <span>PantryPal</span>
      </a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link pp-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link pp-link active" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card p-4">
          <h2 class="h5 mb-3">Login</h2>
          <form id="loginForm" class="row g-3">
            <div class="col-12">
              <input class="form-control" name="username" placeholder="Username" required />
            </div>
            <div class="col-12">
              <input class="form-control" name="password" type="password" placeholder="Password" required />
            </div>
            <div class="col-12">
              <button class="btn btn-primary" type="submit">Login</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card p-4">
          <h2 class="h5 mb-3">Create Account</h2>
          <p class="small text-muted mb-3">
            New accounts are initialized with starter recipes and pantry items.
          </p>
          <form id="registerForm" class="row g-3">
            <div class="col-12">
              <input class="form-control" name="username" placeholder="Username" required />
            </div>
            <div class="col-12">
              <input
                class="form-control"
                name="password"
                type="password"
                minlength="8"
                placeholder="Password (min 8 chars)"
                required
              />
            </div>
            <div class="col-12">
              <button class="btn btn-success" type="submit">Create Account</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <p id="authMessage" class="mt-4 text-danger"></p>
  </main>

  <footer class="pp-footer">
    PantryPal | &copy; 2026 Ricky Lee, Tarun Badarvada | Licensed under MIT
  </footer>

  <script type="module" src="js/login.js"></script>
</body>
</html>
