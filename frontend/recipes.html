<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PantryPal Recipes</title>
  <link rel="icon" type="image/png" href="images/fridge.png" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/recipes.css" />
  <link rel="stylesheet" href="css/navbar.css" />
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg pp-navbar">
    <div class="container">
      <a class="pp-brand" href="index.html">
        <img src="images/fridge.png" alt="PantryPal logo" />
        <span>PantryPal</span>
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link pp-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link pp-link" href="pantry.html">Pantry</a></li>
          <li class="nav-item"><a class="nav-link pp-link active" href="recipes.html">Recipes</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <h3 class="logo">Pantry Pal</h3>
      <div class="health-bar" data-health-bar>Pantry Health: loading...</div>
    </div>

    <h1 class="main-title text-center mb-5">What's Cooking Tonight?</h1>

    <div class="text-center mb-4">
      <div class="btn-group flex-wrap">
        <button class="btn cuisine-btn" data-cuisine="">All</button>
        <button class="btn cuisine-btn" data-cuisine="Mexican">Mexican</button>
        <button class="btn cuisine-btn" data-cuisine="Indian">Indian</button>
        <button class="btn cuisine-btn" data-cuisine="Chinese">Chinese</button>
        <button class="btn cuisine-btn" data-cuisine="Vietnamese">Vietnamese</button>
        <button class="btn cuisine-btn" data-cuisine="Japanese">Japanese</button>
        <button class="btn cuisine-btn" data-cuisine="American">American</button>
      </div>
    </div>

    <div class="row justify-content-center mb-5">
      <div class="col-md-6">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search recipes..."
        />
      </div>
    </div>

    <div class="row g-4" id="recipeContainer"></div>
    <div class="d-flex justify-content-center align-items-center gap-3 mt-4 mb-2">
      <button class="btn btn-outline-light btn-sm" id="prevPageBtn" type="button">Previous</button>
      <span id="pageInfo" class="text-light small">Page 1 of 1</span>
      <button class="btn btn-outline-light btn-sm" id="nextPageBtn" type="button">Next</button>
    </div>

    <div class="card mt-5 p-4">
      <h5 class="mb-3">Add Recipe</h5>
      <form id="addRecipeForm" class="row g-3">
        <div class="col-md-4">
          <input class="form-control" name="title" placeholder="Title" required />
        </div>
        <div class="col-md-4">
          <input class="form-control" name="cuisine" placeholder="Cuisine" required />
        </div>
        <div class="col-md-4">
          <input class="form-control" name="imageUrl" placeholder="Image URL" />
        </div>

        <div class="col-12">
          <input
            class="form-control"
            name="ingredients"
            placeholder="Comma separated ingredients"
            required
          />
        </div>

        <div class="col-12">
          <textarea
            class="form-control"
            name="description"
            placeholder="Description"
          ></textarea>
        </div>

        <div class="col-12">
          <button class="btn btn-success">Add Recipe</button>
        </div>
      </form>
    </div>
  </div>
  <footer class="pp-footer">
    PantryPal | &copy; 2026 Ricky Lee, Tarun Badarvada | Licensed under MIT
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/health.js"></script>
  <script type="module" src="js/recipes.js"></script>
</body>
</html>
